version: '3.8'

# This file pre-pulls the execution sandbox images.
# Run: docker-compose -f docker-compose.judge.yml pull
# The Spring Boot app uses the Docker CLI directly (not compose) to run containers.

services:
  pull-java:
    image: openjdk:17-slim
    command: echo "Java image ready"

  pull-python:
    image: python:3.11-slim
    command: echo "Python image ready"

  pull-cpp:
    image: gcc:12
    command: echo "C++ image ready"
